repositories:
  - name: nats
    url: https://nats-io.github.io/k8s/helm/charts


releases:
  - name: nats
    namespace: opencloud-nats
    chart: nats/nats
    version: 1.3.7
    labels:
      ci-lint-skip: true # skip linting this chart in CI
    values:
      - config:
          cluster:
            enabled: true
            replicas: 3
            name: "opencloud-cluster"
          jetstream:
            enabled: true
            memoryStore:
              enabled: true
              maxSize: 2Gi
          merge:
            00$include: auth.conf
      - configMap:
          merge:
            data:
              # bcrypted password generated with `nats server passwd`:
              # nats-sys: O0Z1O5WG2SIisXUToxUPxQUx
              # opencloud-admin: pwnnH3S42D5dZL90paHEsQop
              auth.conf: |
                accounts {
                  $SYS {
                    users = [
                      { user: "nats-sys",
                        pass: "$2a$11$5BJO2C7WJLjuOm8FBjGjCugs//lL.Sp9gVIBWzU.fITE5MfCbHCMK"
                      }
                    ]
                  }
                  $OPENCLOUD {
                    jetstream: enabled
                    users = [
                      { user: "opencloud"
                      },
                      { user: "opencloud-admin",
                        pass: "$2a$11$6SAHUpN.m2TXOMSdSZVWsOjQ69VCQOBUmxD8FZ/aJpdvzSEOfRodC"
                      }
                    ]
                  }
                }
                no_auth_user: opencloud

  - name: nack-crds
    namespace: opencloud-nack
    chart: ./nack
    labels:
      ci-lint-skip: true # skip linting this chart in CI

  - name: nack-streams
    namespace: opencloud-nats
    chart: ./streams
    labels:
      ci-lint-skip: true # skip linting this chart in CI
    needs:
      - opencloud-nats/nats
      - opencloud-nack/nack-crds

  - name: nack
    namespace: opencloud-nack
    chart: nats/nack
    version: 0.29.0
    labels:
      ci-lint-skip: true # skip linting this chart in CI
    values:
      - namespaced: false
      - readOnly: false
    needs:
      - opencloud-nack/nack-crds

  - name: opencloud
    chart: ../../charts/opencloud
    namespace: opencloud
    values:
      - global:
          # TLS settings
          tls:
            # Enable TLS
            enabled: true
            secretName: opencloud-wildcard-tls
            # Use self-signed certificates
            selfSigned: true

      - collabora:
          # Enable Collabora
          enabled: true
          ssl:
            enabled: false
            verification: false

      - onlyoffice:
          enabled: false

      - ingress:
          # Enable Ingress
          enabled: true
          # Ingress class name
          #ingressClassName: traefik
          annotationsPreset: traefik
          #annotations:                  # arbitrary annotations on the Ingress
          #  cert-manager.io/cluster-issuer: selfsigned-issuer
      # Gateway API configuration
      #- httpRoute:
      #    enabled: true
      #    gateway:
      #      # Create a Gateway API resource
      #      create: true
      #      port: 8443
      #      className: traefik
